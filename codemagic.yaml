workflows:
  android-debug:
    name: TradePro Debug APK
    max_build_duration: 60
    environment:
      java: 11
    scripts:
      - name: Generate Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 7.5
      - name: Build Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk

  android-release:
    name: TradePro Release AAB
    max_build_duration: 60
    environment:
      java: 11
      android_signing:
        - TRaderMindMC
    scripts:
      - name: Generate Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 7.5
      - name: Build Release AAB
        script: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - app/build/outputs/bundle/release/app-release.aab
